<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 800px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #020617; /* Very dark tech blue */
      position: relative;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    /* Techie grid background */
    .bg-mock {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    .bg-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(2,6,23,0) 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* The actual popup container */
    .popup-wrapper {
      position: relative;
      z-index: 10;
      width: 320px;
      background-color: #eef1f6;
      border-radius: 12px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      padding: 16px 20px;
      color: #0f172a;
      overflow: hidden;
    }

    /* popup styles replicated */
    :root {
      --bg-color: #eef1f6;
      --card-bg: #ffffff;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --text-blue: #1e3a8a;
      --primary-blue: #3b82f6;
      --primary-hover: #2563eb;
      --icon-bg: #f1f5f9;
      --border-color: #f1f5f9;
      --toggle-bg: #cbd5e1;
    }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; color: var(--text-blue); }
    .logo-area { display: flex; align-items: center; gap: 8px; }
    .logo-area h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: 0.5px; }
    .logo-area svg { color: var(--text-dark); }
    .close-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }

    .card { background: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-header h2 { font-size: 12px; font-weight: 700; margin: 0; color: var(--text-blue); letter-spacing: 0.5px; }
    .card-header svg { color: var(--text-muted); opacity: 0.5; }

    .list { display: flex; flex-direction: column; }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .item-left { display: flex; align-items: center; gap: 12px; }
    .item-left span { font-size: 14px; font-weight: 500; color: var(--text-dark); }
    .icon-wrapper { width: 32px; height: 32px; background-color: var(--icon-bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); }
    .divider { height: 1px; background-color: var(--border-color); margin: 4px 0; }

    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--primary-blue); border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 23px; bottom: 3px; background-color: white; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

    .main-btn { width: 100%; background-color: var(--primary-blue); color: white; border: none; padding: 14px; border-radius: 24px; font-size: 14px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    
    footer { text-align: center; margin-top: 18px; font-size: 11px; font-weight: 500; }
    footer a { color: var(--text-muted); text-decoration: none; }
  </style>
</head>
<body>
  <div class="bg-mock"></div>
  <div class="bg-glow"></div>

  <div class="popup-wrapper">
    <header>
      <div class="logo-area">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.3 3.3l-8 8A2 2 0 1 0 11.7 13l4.6-4.6"/><path d="M15 6L6.7 14.3a6 6 0 1 0 8.5 8.5"/><path d="M9.5 14L8 15.5 M13 18.5H16.5V22"/>
        </svg>
        <h1>WEB CLEANER</h1>
      </div>
      <button class="close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <div class="card">
      <div class="card-header">
        <h2>QUICK CLEAN</h2>
        <svg width="16" height="4" viewBox="0 0 16 4" fill="currentColor">
          <rect x="0" y="0" width="10" height="2" rx="1"/>
          <rect x="12" y="0" width="2" height="2" rx="1"/>
        </svg>
      </div>
      <div class="list">
        <div class="list-item">
          <div class="item-left">
            <div class="icon-wrapper">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <span>Browser Cache</span>
          </div>
          <label class="toggle"><span class="slider"></span></label>
        </div>
        <div class="divider"></div>
        <div class="list-item">
          <div class="item-left">
            <div class="icon-wrapper">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M8.5 8.5v.01M16 15v.01M12 12v.01M11 17v.01M7 14v.01M15 9v.01"/>
              </svg>
            </div>
            <span>Active Cookies</span>
          </div>
          <label class="toggle"><span class="slider"></span></label>
        </div>
        <div class="divider"></div>
        <div class="list-item">
          <div class="item-left">
            <div class="icon-wrapper">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
              </svg>
            </div>
            <span>Local Storage</span>
          </div>
          <label class="toggle"><span class="slider"></span></label>
        </div>
      </div>
    </div>

    <button class="main-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      START CLEAN
    </button>
    <footer><a href="https://yogesh.tech">yogesh.tech</a></footer>
  </div>
</body>
</html>
